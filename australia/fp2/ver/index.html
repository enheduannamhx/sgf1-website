<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG F1 - Australia GP | FP2 | Verstappen Volta 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root {
            --primary: #00f0ff;
            --secondary: #ff00aa;
            --bg-dark: #050508;
            --text: #fff;
            --text-dim: #888;
            --red: #e10600;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(180deg, #1a1a2e 0%, var(--bg-dark) 100%);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: #12121a;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            padding: 8px 16px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .nav-btn:hover, .nav-btn.active {
            background: var(--primary);
            color: var(--bg-dark);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background: #0a0a0f;
        }
        
        .control-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-play {
            background: var(--red);
            color: white;
        }
        
        .btn-play:hover {
            background: #ff3030;
            transform: scale(1.05);
        }
        
        .btn-reset {
            background: #333;
            color: white;
        }
        
        .btn-reset:hover {
            background: #555;
        }
        
        .info-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 15px;
            background: #0a0a0f;
            flex-wrap: wrap;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--primary);
        }
        
        .info-value.speed { color: #4ade80; }
        .info-value.gear { color: #fbbf24; }
        .info-value.rpm { color: #60a5fa; }
        .info-value.brake { color: #ef4444; }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            height: calc(100vh - 280px);
        }
        
        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
                height: auto;
            }
            #track-plot {
                height: 50vh !important;
            }
        }
        
        #track-plot {
            width: 100%;
            height: 100%;
        }
        
        .telemetry-panel {
            background: #0d0d12;
            padding: 20px;
            overflow-y: auto;
        }
        
        .telemetry-panel h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: var(--primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        
        .telemetry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .telemetry-card {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .telemetry-card.full {
            grid-column: 1 / -1;
        }
        
        .telemetry-card .label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .telemetry-card .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--text);
        }
        
        .telemetry-card .value.good { color: #4ade80; }
        .telemetry-card .value.warn { color: #fbbf24; }
        .telemetry-card .value.bad { color: #ef4444; }
        
        .progress-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }
        
        .progress-section .label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--red), #ff3030);
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .corner-list {
            margin-top: 20px;
        }
        
        .corner-list h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
        
        .corner-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #1a1a2e;
            margin-bottom: 5px;
            border-radius: 5px;
        }
        
        .corner-num {
            width: 25px;
            height: 25px;
            background: #fbbf24;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
        }
        
        .corner-info {
            font-size: 0.85rem;
        }
        
        .back-link {
            display: block;
            text-align: center;
            padding: 10px;
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏎️ AUSTRALIA GP - FP2</h1>
        <p class="subtitle">Max Verstappen | Volta 1 (Saída dos Boxes)</p>
    </div>
    
    <div class="nav">
        <a href="/australia/fp1" class="nav-btn">FP1</a>
        <a href="/australia/fp2" class="nav-btn active">FP2</a>
        <a href="/australia/fp2/ver" class="nav-btn">VER</a>
        <a href="/australia/fp3" class="nav-btn">FP3</a>
        <a href="/australia/qualy" class="nav-btn">QUALY</a>
        <a href="/australia/race" class="nav-btn">RACE</a>
    </div>
    
    <div class="controls">
        <button class="control-btn btn-play" onclick="playAnimation()">▶ Play</button>
        <button class="control-btn btn-reset" onclick="resetAnimation()">↺ Reset</button>
    </div>
    
    <div class="info-bar">
        <div class="info-item">
            <div class="info-label">Tempo Volta</div>
            <div class="info-value" id="lapTime">00:00.000</div>
        </div>
        <div class="info-item">
            <div class="info-label">Compound</div>
            <div class="info-value" id="compound">MEDIUM</div>
        </div>
        <div class="info-item">
            <div class="info-label">Setor Atual</div>
            <div class="info-value" id="sector">1</div>
        </div>
    </div>
    
    <div class="main-content">
        <div id="track-plot"></div>
        
        <div class="telemetry-panel">
            <h2>📊 Telemetria</h2>
            
            <div class="telemetry-grid">
                <div class="telemetry-card">
                    <div class="label">Velocidade</div>
                    <div class="value good" id="speed">0 km/h</div>
                </div>
                <div class="telemetry-card">
                    <div class="label">Marcha</div>
                    <div class="value warn" id="gear">N</div>
                </div>
                <div class="telemetry-card">
                    <div class="label">RPM</div>
                    <div class="value" id="rpm">0</div>
                </div>
                <div class="telemetry-card">
                    <div class="label">DRS</div>
                    <div class="value" id="drs">0</div>
                </div>
                <div class="telemetry-card full">
                    <div class="label">Acelerador</div>
                    <div class="value" id="throttle">0%</div>
                </div>
                <div class="telemetry-card full">
                    <div class="label">Freio</div>
                    <div class="value" id="brake">OFF</div>
                </div>
            </div>
            
            <div class="progress-section">
                <div class="label">Progresso da Volta</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress"></div>
                </div>
            </div>
            
            <div class="corner-list">
                <h3>📍 Curvas</h3>
                <div id="corners"></div>
            </div>
        </div>
    </div>
    
    <a href="/australia" class="back-link">← Voltar para seleção de sessão</a>

    <script>
        let telemetry = [];
        let circuitCorners = [];
        let currentIndex = 0;
        let isPlaying = false;
        let animationId = null;
        
        // Limites do circuito
        let minX, maxX, minY, maxY;
        
        async function loadData() {
            try {
                const response = await fetch('verstappen_volta1.json');
                const data = await response.json();
                
                telemetry = data.telemetry;
                circuitCorners = data.circuito.corners;
                
                console.log(`Carregados ${telemetry.length} pontos`);
                
                // Calcular bounds
                minX = Math.min(...telemetry.map(t => t.x));
                maxX = Math.max(...telemetry.map(t => t.x));
                minY = Math.min(...telemetry.map(t => t.y));
                maxY = Math.max(...telemetry.map(t => t.y));
                
                // Adicionar margem
                const margin = 150;
                minX -= margin; maxX += margin;
                minY -= margin; maxY += margin;
                
                // Renderizar corners
                renderCorners();
                
                // Iniciar
                initPlot();
            } catch (e) {
                console.error('Erro:', e);
                document.getElementById('track-plot').innerHTML = '<div style="color:#888;text-align:center;padding:50px;">Erro ao carregar dados</div>';
            }
        }
        
        function renderCorners() {
            const container = document.getElementById('corners');
            container.innerHTML = '';
            
            circuitCorners.forEach(c => {
                const div = document.createElement('div');
                div.className = 'corner-item';
                div.innerHTML = `
                    <div class="corner-num">${c.numero}</div>
                    <div class="corner-info">Curva ${c.numero}</div>
                `;
                container.appendChild(div);
            });
        }
        
        function initPlot() {
            const x = telemetry.map(t => t.x);
            const y = telemetry.map(t => t.y);
            
            // Pista (borda externa)
            const trackTrace = {
                x: x,
                y: y,
                mode: 'lines',
                line: { color: '#444', width: 60 },
                name: 'Pista',
                hoverinfo: 'skip'
            };
            
            // Linha central
            const centerTrace = {
                x: x,
                y: y,
                mode: 'lines',
                line: { color: '#666', width: 2, dash: 'dash' },
                name: 'Centro',
                hoverinfo: 'skip'
            };
            
            // Trail (trajetória)
            const trailTrace = {
                x: [],
                y: [],
                mode: 'lines',
                line: { color: '#e10600', width: 4 },
                name: 'Trail',
                hoverinfo: 'skip'
            };
            
            // Carro
            const carTrace = {
                x: [telemetry[0].x],
                y: [telemetry[0].y],
                mode: 'markers',
                marker: { 
                    size: 25, 
                    color: '#e10600',
                    line: { color: '#fff', width: 3 },
                    symbol: 'circle'
                },
                name: 'CAR'
            };
            
            // Corners
            const cornerX = circuitCorners.map(c => c.x);
            const cornerY = circuitCorners.map(c => c.y);
            
            const cornerTrace = {
                x: cornerX,
                y: cornerY,
                mode: 'markers+text',
                marker: { 
                    size: 20, 
                    color: '#fbbf24',
                    line: { color: '#000', width: 2 }
                },
                text: circuitCorners.map(c => c.numero.toString()),
                textposition: 'center',
                textfont: { color: '#000', size: 10, family: 'Orbitron' },
                name: 'Curvas',
                hoverinfo: 'skip'
            };
            
            const layout = {
                paper_bgcolor: '#050508',
                plot_bgcolor: '#050508',
                showlegend: false,
                margin: { t: 20, b: 20, l: 20, r: 20 },
                xaxis: { 
                    range: [minX, maxX],
                    showgrid: false, 
                    zeroline: false, 
                    showticklabels: false 
                },
                yaxis: { 
                    range: [minY, maxY],
                    showgrid: false, 
                    zeroline: false, 
                    showticklabels: false,
                    scaleanchor: 'x',
                    scaleratio: 1
                }
            };
            
            Plotly.newPlot('track-plot', [trackTrace, centerTrace, trailTrace, carTrace, cornerTrace], layout, {
                displayModeBar: false,
                responsive: true
            });
            
            // Atualizar telemetria inicial
            updateTelemetry();
        }
        
        function updateTelemetry() {
            if (currentIndex >= telemetry.length) return;
            
            const car = telemetry[currentIndex];
            
            // Atualizar valores
            document.getElementById('speed').textContent = Math.round(car.speed) + ' km/h';
            document.getElementById('gear').textContent = car.gear;
            document.getElementById('rpm').textContent = Math.round(car.rpm);
            document.getElementById('drs').textContent = car.drs;
            document.getElementById('throttle').textContent = Math.round(car.throttle) + '%';
            
            const brakeEl = document.getElementById('brake');
            brakeEl.textContent = car.brake ? 'ON' : 'OFF';
            brakeEl.className = 'value ' + (car.brake ? 'bad' : 'good');
            
            // Tempo (assumindo que começa em 25:53.881)
            const time = (car.time - 1553.881); // Ajustado para o início real
            const minutes = Math.floor(Math.max(0, time) / 60);
            const seconds = Math.max(0, time) % 60;
            document.getElementById('lapTime').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toFixed(3).padStart(6, '0')}`;
            
            // Setor
            let sector = 1;
            if (time > 38.5) sector = 2; // Após S1
            if (time > 60) sector = 3;   // Após S2
            document.getElementById('sector').textContent = sector;
            
            // Progresso
            const progress = (currentIndex / telemetry.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
            
            // Cor da velocidade
            const speedEl = document.getElementById('speed');
            if (car.speed > 200) speedEl.className = 'value good';
            else if (car.speed > 100) speedEl.className = 'value warn';
            else speedEl.className = 'value bad';
        }
        
        function drawCar() {
            if (currentIndex >= telemetry.length) {
                isPlaying = false;
                return;
            }
            
            const car = telemetry[currentIndex];
            
            // Trail points
            const trailX = telemetry.slice(0, currentIndex + 1).map(t => t.x);
            const trailY = telemetry.slice(0, currentIndex + 1).map(t => t.y);
            
            // Cores baseadas em velocidade para cada ponto
            const colors = telemetry.slice(0, currentIndex + 1).map(t => {
                if (t.speed > 200) return '#4ade80';
                if (t.speed > 100) return '#fbbf24';
                return '#ef4444';
            });
            
            Plotly.animate('track-plot', {
                data: [{}, {}, { x: trailX, y: trailY }, { x: [car.x], y: [car.y] }, {}],
                traces: [0, 1, 2, 3]
            }, {
                transition: { duration: 0 },
                frame: { duration: 0, redraw: false }
            });
            
            updateTelemetry();
        }
        
        function animate() {
            if (!isPlaying) return;
            
            currentIndex++;
            if (currentIndex >= telemetry.length) {
                isPlaying = false;
                return;
            }
            
            drawCar();
            animationId = requestAnimationFrame(() => setTimeout(animate, 30));
        }
        
        function playAnimation() {
            if (currentIndex >= telemetry.length) {
                currentIndex = 0;
            }
            isPlaying = true;
            animate();
        }
        
        function resetAnimation() {
            isPlaying = false;
            if (animationId) clearTimeout(animationId);
            currentIndex = 0;
            
            // Reset plot
            Plotly.animate('track-plot', {
                data: [{}, {}, { x: [], y: [] }, { x: [telemetry[0].x], y: [telemetry[0].y] }, {}],
                traces: [0, 1, 2, 3]
            }, {
                transition: { duration: 0 },
                frame: { duration: 0, redraw: false }
            });
            
            updateTelemetry();
        }
        
        loadData();
    </script>
</body>
</html>
