<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG F1 - Bortoleto Best Lap</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root {
            --primary: #00f0ff;
            --secondary: #ff00aa;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --text: #fff;
            --text-dim: #888;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4444;
            --audi: #d61818;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg-dark);
            font-family: 'Roboto', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }
        
        header {
            background: linear-gradient(135deg, rgba(214,24,24,0.3), rgba(0,240,255,0.1));
            padding: 20px;
            border-bottom: 3px solid var(--audi);
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .driver-badge {
            background: var(--audi);
            color: #fff;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-top: 5px;
        }
        
        .main-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            padding: 20px;
            max-width: 1800px;
            margin: 0 auto;
        }
        
        @media (max-width: 1200px) {
            .main-container { grid-template-columns: 1fr; }
        }
        
        .track-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #333;
        }
        
        #track-plot {
            width: 100%;
            height: 600px;
            background: #050508;
            border-radius: 10px;
        }
        
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            padding: 15px;
            background: #1a1a25;
            border-radius: 12px;
        }
        
        .play-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--audi);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        
        .play-btn:hover { transform: scale(1.1); }
        
        .play-btn svg { fill: #fff; width: 18px; height: 18px; }
        
        .timeline {
            flex: 1;
            height: 8px;
            background: #333;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }
        
        .timeline-progress {
            height: 100%;
            background: var(--audi);
            border-radius: 4px;
            width: 0%;
            transition: width 0.05s linear;
        }
        
        .time-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            color: var(--primary);
            min-width: 90px;
            text-align: right;
            flex-shrink: 0;
        }
        
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
        }
        
        .card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .lap-time {
            font-family: 'Orbitron', sans-serif;
            font-size: 56px;
            color: var(--primary);
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 20px var(--primary);
        }
        
        .lap-label {
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .sectors {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .sector {
            background: #1a1a25;
            padding: 12px 8px;
            border-radius: 8px;
            text-align: center;
        }
        
        .sector-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        
        .sector-time {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            color: var(--text);
            margin-top: 5px;
        }
        
        .telemetry-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .telemetry-item {
            background: #1a1a25;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .telemetry-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: bold;
        }
        
        .telemetry-label {
            font-size: 9px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 5px;
        }
        
        .speed { color: var(--primary); }
        .rpm { color: var(--secondary); }
        .gear { color: var(--success); }
        .throttle { color: var(--warning); }
        
        .speed-bar {
            height: 24px;
            background: linear-gradient(90deg, #00ff88 0%, #ffff00 50%, #ff4444 100%);
            border-radius: 12px;
            position: relative;
            margin: 15px 0 5px;
        }
        
        .speed-marker {
            position: absolute;
            top: -4px;
            bottom: -4px;
            width: 6px;
            background: #fff;
            border-radius: 3px;
            left: 0%;
            box-shadow: 0 0 10px #fff;
            transition: left 0.05s linear;
        }
        
        .speed-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-dim);
        }
        
        .status-bars {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .status-bar {
            flex: 1;
            height: 35px;
            background: #1a1a25;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            transition: all 0.1s;
        }
        
        .status-bar.active { background: var(--danger); color: #fff; }
        .status-bar.drs { background: var(--success); color: #000; }
        
        .sector-progress {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-top: 10px;
        }
        
        .sector-prog {
            text-align: center;
            padding: 10px;
            background: #1a1a25;
            border-radius: 8px;
            font-size: 11px;
        }
        
        .sector-prog.s1 { border-top: 3px solid var(--primary); }
        .sector-prog.s2 { border-top: 3px solid var(--secondary); }
        .sector-prog.s3 { border-top: 3px solid var(--success); }
        
        .lap-info {
            display: flex;
            justify-content: space-around;
            padding-top: 15px;
            border-top: 1px solid #333;
        }
        
        .lap-info-item {
            text-align: center;
        }
        
        .lap-info-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
        }
        
        .lap-info-label {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 3px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-dim);
            font-size: 18px;
        }
    </style>
</head>
<body>
    <header>
        <h1>
            SG<span style="color:#00f0ff">F1</span>
            <span class="driver-badge">BOR</span>
        </h1>
        <div class="subtitle">BAHRAIN INTERNATIONAL CIRCUIT • PRE-SEASON 2026 • BEST LAP</div>
    </header>
    
    <div class="main-container">
        <div class="track-card">
            <div id="track-plot">
                <div class="loading">Carregando dados...</div>
            </div>
            
            <div class="controls">
                <button class="play-btn" id="playBtn">
                    <svg viewBox="0 0 24 24" id="playIcon"><polygon points="5,3 19,12 5,21"/></svg>
                    <svg viewBox="0 0 24 24" id="pauseIcon" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <div class="timeline" id="timeline">
                    <div class="timeline-progress" id="timelineProgress"></div>
                </div>
                <div class="time-display" id="timeDisplay">0:00.000</div>
            </div>
        </div>
        
        <div class="sidebar">
            <div class="card">
                <div class="lap-label">BEST LAP</div>
                <div class="lap-time" id="lapTime">1:33</div>
                
                <div class="sectors">
                    <div class="sector">
                        <div class="sector-label">Setor 1</div>
                        <div class="sector-time" id="sector1">31.234</div>
                    </div>
                    <div class="sector">
                        <div class="sector-label">Setor 2</div>
                        <div class="sector-time" id="sector2">31.567</div>
                    </div>
                    <div class="sector">
                        <div class="sector-label">Setor 3</div>
                        <div class="sector-time" id="sector3">30.954</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h3>Telemetry</h3>
                <div class="telemetry-grid">
                    <div class="telemetry-item">
                        <div class="telemetry-value speed" id="speedValue">0</div>
                        <div class="telemetry-label">km/h</div>
                    </div>
                    <div class="telemetry-item">
                        <div class="telemetry-value gear" id="gearValue">N</div>
                        <div class="telemetry-label">GEAR</div>
                    </div>
                    <div class="telemetry-item">
                        <div class="telemetry-value throttle" id="throttleValue">0%</div>
                        <div class="telemetry-label">THROTTLE</div>
                    </div>
                </div>
                
                <div class="speed-bar">
                    <div class="speed-marker" id="speedMarker"></div>
                </div>
                <div class="speed-labels">
                    <span>0</span>
                    <span>175</span>
                    <span>350</span>
                </div>
                
                <div class="status-bars">
                    <div class="status-bar" id="brakeBar">BRAKE</div>
                    <div class="status-bar" id="drsBar">DRS</div>
                </div>
            </div>
            
            <div class="card">
                <h3>Setores</h3>
                <div class="sector-progress">
                    <div class="sector-prog s1">
                        <div>S1</div>
                        <div id="s1Prog">0%</div>
                    </div>
                    <div class="sector-prog s2">
                        <div>S2</div>
                        <div id="s2Prog">0%</div>
                    </div>
                    <div class="sector-prog s3">
                        <div>S3</div>
                        <div id="s3Prog">0%</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h3>Info</h3>
                <div class="lap-info">
                    <div class="lap-info-item">
                        <div class="lap-info-value" id="compoundValue">MEDIUM</div>
                        <div class="lap-info-label">TYRE</div>
                    </div>
                    <div class="lap-info-item">
                        <div class="lap-info-value" id="sessionValue">T2S3</div>
                        <div class="lap-info-label">SESSION</div>
                    </div>
                    <div class="lap-info-item">
                        <div class="lap-info-value" id="dayValue">22/FEV</div>
                        <div class="lap-info-label">DAY</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global data
        let telemetryData = [];
        let currentIndex = 0;
        let isPlaying = false;
        let animationId = null;
        let lastTime = 0;
        let totalTime = 93755;
        
        // Plotly traces
        let trackTrace, carTrace, trailTrace;
        
        // Load data
        async function loadData() {
            try {
                const response = await fetch('bortoleto_100hz.json');
                const data = await response.json();
                
                telemetryData = data.telemetry;
                totalTime = data.metadata.total_time_ms;
                
                telemetryData = data.telemetry;
                totalTime = data.metadata.total_time_ms;
                
                document.getElementById('lapTime').textContent = data.metadata.lap_time.replace('.', '');
                document.getElementById('compoundValue').textContent = data.metadata.compound;
                document.getElementById('sessionValue').textContent = 'T2S3';
                document.getElementById('dayValue').textContent = '22/FEV';
                
                initPlot();
            } catch (e) {
                console.error('Error loading data:', e);
                document.getElementById('track-plot').innerHTML = '<div class="loading">Erro ao carregar dados</div>';
            }
        }
        
        function initPlot() {
            const x = telemetryData.map(t => t.x);
            const y = telemetryData.map(t => t.y);
            
            // Track background
            trackTrace = {
                x: x,
                y: y,
                mode: 'lines',
                line: { color: '#222', width: 40 },
                name: 'Pista',
                hoverinfo: 'skip'
            };
            
            // Racing line
            const racingLine = {
                x: x,
                y: y,
                mode: 'lines',
                line: { color: '#00f0ff', width: 2, dash: 'dash' },
                name: 'Linha',
                opacity: 0.5,
                hoverinfo: 'skip'
            };
            
            // Trail
            trailTrace = {
                x: [x[0]],
                y: [y[0]],
                mode: 'lines',
                line: { color: '#d61818', width: 4 },
                name: 'Trail',
                hoverinfo: 'skip'
            };
            
            // Car marker
            carTrace = {
                x: [x[0]],
                y: [y[0]],
                mode: 'markers',
                marker: { 
                    size: 20, 
                    color: '#d61818',
                    line: { color: '#fff', width: 3 }
                },
                name: 'CAR',
                hoverinfo: 'skip'
            };
            
            const layout = {
                paper_bgcolor: '#050508',
                plot_bgcolor: '#050508',
                showlegend: false,
                margin: { t: 20, b: 20, l: 20, r: 20 },
                xaxis: { 
                    range: [Math.min(...x) - 100, Math.max(...x) + 100],
                    showgrid: false, 
                    zeroline: false, 
                    showticklabels: false 
                },
                yaxis: { 
                    range: [Math.min(...y) - 100, Math.max(...y) + 100],
                    showgrid: false, 
                    zeroline: false, 
                    showticklabels: false,
                    scaleanchor: 'x',
                    scaleratio: 1
                }
            };
            
            Plotly.newPlot('track-plot', [trackTrace, racingLine, trailTrace, carTrace], layout, {
                displayModeBar: false,
                responsive: true
            });
            
            updateDisplay(0);
        }
        
        function updateDisplay(index) {
            const d = telemetryData[index];
            const progress = index / telemetryData.length;
            
            // Time
            const secs = d.time_sec;
            const mins = Math.floor(secs / 60);
            const s = (secs % 60).toFixed(3);
            document.getElementById('timeDisplay').textContent = `${mins}:${s.padStart(6, '0')}`;
            
            // Timeline
            document.getElementById('timelineProgress').style.width = `${progress * 100}%`;
            
            // Telemetry - using new field names (integer speed)
            document.getElementById('speedValue').textContent = Math.round(d.speed_kmh);
            document.getElementById('gearValue').textContent = d.gear;
            document.getElementById('throttleValue').textContent = `${Math.round(d.throttle_pct)}%`;
            
            // Speed bar
            document.getElementById('speedMarker').style.left = `${Math.min(100, (d.speed_kmh / 350) * 100)}%`;
            
            // Status
            document.getElementById('brakeBar').classList.toggle('active', d.brake);
            document.getElementById('drsBar').classList.toggle('drs', d.drs > 0);
            
            // Sector progress
            if (progress < 0.33) {
                document.getElementById('s1Prog').textContent = `${Math.round(progress / 0.33 * 100)}%`;
                document.getElementById('s2Prog').textContent = '0%';
                document.getElementById('s3Prog').textContent = '0%';
            } else if (progress < 0.66) {
                document.getElementById('s1Prog').textContent = '100%';
                document.getElementById('s2Prog').textContent = `${Math.round((progress - 0.33) / 0.33 * 100)}%`;
                document.getElementById('s3Prog').textContent = '0%';
            } else {
                document.getElementById('s1Prog').textContent = '100%';
                document.getElementById('s2Prog').textContent = '100%';
                document.getElementById('s3Prog').textContent = `${Math.round((progress - 0.66) / 0.34 * 100)}%`;
            }
            
            // Update just the car marker position - much faster
            Plotly.restyle('track-plot', {
                x: [[d.x]],
                y: [[d.y]]
            }, [3]);
        }
        
        // Play/Pause
        document.getElementById('playBtn').addEventListener('click', () => {
            isPlaying = !isPlaying;
            document.getElementById('playIcon').style.display = isPlaying ? 'none' : 'block';
            document.getElementById('pauseIcon').style.display = isPlaying ? 'block' : 'none';
            
            if (isPlaying) {
                lastTime = performance.now();
                playLoop();
            }
        });
        
        // Timeline click
        document.getElementById('timeline').addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            currentIndex = Math.floor(pos * telemetryData.length);
            updateDisplay(currentIndex);
        });
        
        // Play loop - 100Hz real-time sync
        function playLoop() {
            if (!isPlaying) return;
            
            const now = performance.now();
            const elapsed = now - lastTime;
            
            // Target: 100 updates per second = 10ms per frame
            const targetFPS = 100;
            const msPerFrame = 1000 / targetFPS;
            
            // Calculate how many points should have passed
            const msPerPoint = totalTime / telemetryData.length;
            const pointsToAdvance = Math.floor(elapsed / msPerPoint);
            
            if (pointsToAdvance > 0 && currentIndex < telemetryData.length - 1) {
                // Advance multiple points if needed (but cap at reasonable amount)
                const maxAdvance = Math.min(pointsToAdvance, 10);
                currentIndex = Math.min(currentIndex + maxAdvance, telemetryData.length - 1);
                lastTime = now - ((elapsed) % msPerPoint);
                
                updateDisplay(currentIndex);
            }
            
            if (currentIndex >= telemetryData.length - 1) {
                isPlaying = false;
                document.getElementById('playIcon').style.display = 'block';
                document.getElementById('pauseIcon').style.display = 'none';
                return;
            }
            
            animationId = requestAnimationFrame(playLoop);
        }
        
        // Init
        loadData();
    </script>
</body>
</html>
